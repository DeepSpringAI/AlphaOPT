# All LLM calls use gpt-5 through llm-api-proxy (OpenAI-compatible /v1).
# Ensure llm-api-proxy is running; default listen port 8801 — see your LLMProxy-credentials.toml.
base_model: gpt-5
advanced_model: gpt-5
base_service: "http://127.0.0.1:8801/v1"
advanced_service: "http://127.0.0.1:8801/v1"
verbose: false
start_iter: 0
data_slice:

# API Keys (OPENAI_API_KEY can be a placeholder like EMPTY if the proxy does not require it; prefer real key in ~/.config/AlphaOPT-credentials.toml)
api_keys:
  OPEN_ROUTER_KEY:
  GEMINI_API_KEY:
  OPENAI_API_KEY:

params:
  num_iterations: 1
  batch_size: 12
  tolerance: 1e-6
  max_solution_attempts: 1
  max_verify_attempts: 3
  variant_num: 5  # the number of refined condition

dataset: train_data_all_452_pulp
output_folder: train_data_all_452_pulp_flash
file_paths:
  train_data_path: ./data/optimization_tasks/train/${dataset}.json
  train_output_dir: ./learning/${output_folder}/
  lib_dir: ./data/experience_library/iterations/${output_folder}/
  metrics_log_path: ./learning/${output_folder}/iteration_metrics.json

ablation:
  taxonomy: true
  rewrite: false
  include_example: true
  include_program_insight: true
  max_debug_retry: 3

# Token pricing (USD per 1M tokens) — rough placeholder for gpt-5; override when you have list prices
pricing:
  openai:
    "gpt-5":
      prompt_per_million: 2.00
      completion_per_million: 8.00

  gemini:
    gemini-2.5-pro:
      prompt_per_million: 1.25
      completion_per_million: 10.0
    gemini-2.5-flash:
      prompt_per_million: 0.30
      completion_per_million: 2.50

  openrouter:
    default:
      prompt_per_million: 0.0
      completion_per_million: 0.0
