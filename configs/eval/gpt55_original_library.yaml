datasets: [nlp4lp_test, nl4opt_test, industryor_test, logior, optibench, optmath_bench]
data_path_template: ./data/optimization_tasks/split/test_data/${dataset}.json

library_path: ./data/experience_library/default/library.json
taxonomy_path: ./data/experience_library/default/latest_taxonomy_new.json

output_folder_template: ${dataset}_eval_gpt55_e1_original
model: gpt-5.5
service: http://127.0.0.1:4010/v1

n_runs: 3
temperature: 0.0
pass_at_k: 1

ablation:
  taxonomy: true
  rewrite: false
  include_example: true
  include_program_insight: true
  max_debug_retry: 5

  sweep_one_by_one: false
  sweep_params: [include_example]
  include_base: false
