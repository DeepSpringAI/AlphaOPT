datasets: [optmath_bench, nlp4lp_test, nl4opt_test, industryor_test, logior, optibench]
data_path_template: ./data/optimization_tasks/split/test_data/${dataset}.json

library_path: ./data/experience_library/gpt55_gurobi_train_data_all_452/library_refine_iter1.json
taxonomy_path: ./data/experience_library/gpt55_gurobi_train_data_all_452/latest_taxonomy_refine_iter1.json

output_folder_template: ${dataset}_eval_gpt55_e2_retrained
model: gpt-5.5
service: http://127.0.0.1:4010/v1
reasoning_effort: medium # OpenAI-compatible services only; set null/off to omit

n_runs: 1
temperature: 0.0
pass_at_k: 1
resume: true
repair: true

llm_retry:
  request_timeout_sec: 120
  transient_max_elapsed_sec: 900
  transient_max_sleep_sec: 300

ablation:
  taxonomy: true
  rewrite: false
  include_example: true
  include_program_insight: true
  max_debug_retry: 5

  sweep_one_by_one: false
  sweep_params: [include_example]
  include_base: false
