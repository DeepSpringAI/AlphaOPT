# Copy to ~/.config/AlphaOPT-credentials.toml and fill in secrets.
# Gitignored paths: ~/.config is never committed from this repo.
#
# Precedence for each key:
#   1. Environment variables (they override everything when set)
#   2. train_config.yaml / eval_config.yaml (api_keys)
#   3. This file ([api_keys])
#
# OpenAI-compatible proxy (optional): set base_service / service in YAML to the URL,
# e.g. http://localhost:8801/v1 — see README.

[api_keys]
# OPEN_ROUTER_KEY = ""
# GEMINI_API_KEY = ""
# OPENAI_API_KEY = ""
